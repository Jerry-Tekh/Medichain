services:
  - type: web
    name: medichain-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/ready
    autoDeployTrigger: commit
    numInstances: 1
    envVars:
      - key: MEDICHAIN_ENV
        value: production
      - key: MEDICHAIN_BACKEND_MODE
        value: genlayer
      - key: MEDICHAIN_CONTRACT_ADDRESS
        value: 0x71EACA0FB43DE806e8e549554fc0D91BBdbB2213
      - key: GENLAYER_RPC_URL
        value: https://rpc-bradbury.genlayer.com
      - key: GENLAYER_NETWORK
        value: testnet-bradbury
      - key: GENLAYER_ACCOUNT_NAME
        value: medichain-production
      - key: GENLAYER_CLI_COMMAND
        value: genlayer
      - key: GENLAYER_MAX_TRANSACTION_COST_WEI
        value: "500000000000000000"
      - key: GENLAYER_TIMEOUT_SECONDS
        value: "600"
      - key: MEDICHAIN_WALLET_AUTH_REQUIRED
        value: "true"
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_ISSUER
        value: medichain-api
      - key: JWT_AUDIENCE
        value: medichain-web
      - key: MEDICHAIN_AUTH_DOMAIN
        value: medichain-blush.vercel.app
      - key: MEDICHAIN_AUTH_URI
        value: https://medichain-blush.vercel.app
      - key: MEDICHAIN_AUTH_CHAIN_ID
        value: "4221"
      - key: MEDICHAIN_AUTH_CHALLENGE_TTL_SECONDS
        value: "300"
      - key: MEDICHAIN_AUTH_SESSION_TTL_SECONDS
        value: "3600"
      - key: MEDICHAIN_ADMIN_WALLETS
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://medichain-blush.vercel.app
      - key: ALLOWED_HOSTS
        value: medichain-q34c.onrender.com
      - key: PRIVATE_KEY
        sync: false
      - key: GENLAYER_KEYSTORE_PASSWORD
        sync: false
