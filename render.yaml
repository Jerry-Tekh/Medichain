services:
  - type: web
    name: medichain-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /api/ready
    autoDeployTrigger: commit
    numInstances: 1
    envVars:
      - key: MEDICHAIN_ENV
        value: production
      - key: MEDICHAIN_BACKEND_MODE
        value: genlayer
      - key: MEDICHAIN_CONTRACT_ADDRESS
        value: 0xebb0590f54Aaf1bA1Cfd544325307759c1F79e50
      - key: GENLAYER_RPC_URL
        value: https://rpc-bradbury.genlayer.com
      - key: GENLAYER_NETWORK
        value: testnet-bradbury
      - key: GENLAYER_ACCOUNT_NAME
        value: medichain-production
      - key: GENLAYER_CLI_COMMAND
        value: genlayer
      - key: GENLAYER_TIMEOUT_SECONDS
        value: "600"
      - key: MEDICHAIN_REQUIRE_WRITE_AUTH
        value: "true"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_HOSTS
        sync: false
      - key: API_TOKENS
        sync: false
      - key: PRIVATE_KEY
        sync: false
      - key: GENLAYER_KEYSTORE_PASSWORD
        sync: false
